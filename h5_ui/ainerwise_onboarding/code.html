<div class="absolute top-[-10%] right-[-20%] w-[80%] h-[60%] bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-20%] w-[80%] h-[60%] bg-secondary/5 rounded-full blur-[100px]"></div>
</div>
<script>
        function toggleChip(element, category) {
            // Check if category is single select or multiple
            const singleSelectCategories = ['native', 'target', 'level'];
            
            if (singleSelectCategories.includes(category)) {
                // Remove active class from all siblings in the same container
                const container = element.parentElement;
                const siblings = container.querySelectorAll('button');
                siblings.forEach(sib => sib.classList.remove('chip-active'));
                element.classList.add('chip-active');
            } else {
                // Toggle for multi-select
                element.classList.toggle('chip-active');
            }
            
            // Haptic-like feedback if supported
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        // Initialize with some defaults for demonstration
        document.addEventListener('DOMContentLoaded', () => {
            const firstNative = document.querySelector('button[onclick*="native"]');
            if(firstNative) firstNative.classList.add('chip-active');
            
            const firstTarget = document.querySelector('button[onclick*="target"]');
            if(firstTarget) firstTarget.classList.add('chip-active');
        });
    </script>
