</button>

                        稍后再说

<script>
        function toggleChip(element, group) {
            // Find all chips in the same context if it's a single select
            const container = element.parentElement;
            const chips = container.querySelectorAll('.chip');
            
            chips.forEach(chip => {
                if (chip === element) {
                    chip.classList.toggle('chip-active');
                    if (chip.classList.contains('chip-active')) {
                        // Feedback vibration if supported
                        if (window.navigator && window.navigator.vibrate) {
                            window.navigator.vibrate(10);
                        }
                    }
                } else {
                    chip.classList.remove('chip-active');
                }
            });

            // Update button state visually (optional interaction)
            updateNextButtonState();
        }

        function updateNextButtonState() {
            const activeChips = document.querySelectorAll('.chip-active');
            const nextBtn = document.getElementById('nextBtn');
            
            if (activeChips.length >= 3) {
                nextBtn.classList.remove('opacity-50');
                nextBtn.style.boxShadow = '0 8px 30px rgb(79,70,229,0.3)';
            } else {
                // Keep it active but maybe less intense for this flow
                // nextBtn.classList.add('opacity-50');
            }
        }

        // Add subtle hover/interaction effects to the header
        document.addEventListener('DOMContentLoaded', () => {
            const logo = document.querySelector('.material-symbols-outlined');
            if(logo) {
                logo.style.transition = 'all 1s ease-in-out';
                setInterval(() => {
                    logo.style.transform = 'rotate(10deg) scale(1.1)';
                    setTimeout(() => {
                        logo.style.transform = 'rotate(0deg) scale(1)';
                    }, 500);
                }, 4000);
            }
        });
    </script>
