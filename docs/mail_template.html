<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Ainerwise 安全验证</title>
</head>

<body
    style="margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f6f8; color: #333333;">
    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #f4f6f8; padding: 30px 0;">
        <tr>
            <td>
                <table align="center" width="550" border="0" cellspacing="0" cellpadding="0"
                    style="background-color: #ffffff; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden;">
                    <tr>
                        <td style="background-color: #1a1a1a; padding: 25px; text-align: center;">
                            <span
                                style="font-size: 22px; font-weight: bold; color: #ffffff; letter-spacing: 1px;">Ainerwise</span>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 30px 40px;">
                            <p style="font-size: 16px; line-height: 24px; color: #333333; margin: 0 0 20px 0;">尊敬的用户：
                            </p>
                            <p style="font-size: 14px; line-height: 24px; color: #555555; margin: 0 0 25px 0;">
                                您好！您正在进行账号安全验证，本次操作的验证码为：</p>

                            <div
                                style="background-color: #f8f9fa; border: 1px dashed #dddddd; border-radius: 4px; padding: 15px; text-align: center; margin-bottom: 25px;">
                                <span
                                    style="font-size: 28px; font-weight: bold; color: #0052cc; letter-spacing: 4px;">{{code}}</span>
                            </div>

                            <p style="font-size: 13px; line-height: 20px; color: #888888; margin: 0 0 10px 0;">*
                                该验证码有效期为 10 分钟，请勿泄露给他人。</p>
                            <p style="font-size: 13px; line-height: 20px; color: #888888; margin: 0;">* 如果非您本人操作，请忽略此邮件。
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td
                            style="background-color: #fafafa; border-top: 1px solid #eeeeee; padding: 20px; text-align: center;">
                            <p style="font-size: 12px; color: #999999; margin: 0 0 5px 0;">此邮件由系统自动发出，请勿直接回复。</p>
                            <p style="font-size: 12px; color: #999999; margin: 0;">© 2026 Ainerwise. All rights
                                reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
