services:
  api:
    build:
      context: ./apps/api
    env_file:
      - .env.development
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://ainerwise:ainerwise@postgres:5432/ainerwise
      REDIS_URL: redis://redis:6379/0
    ports:
      - "7070:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - ./apps/api/uploads:/app/uploads
      - ./apps/api/alembic:/app/alembic
      - ./apps/api/alembic.ini:/app/alembic.ini
      # 开发：挂载源码，改代码后 uvicorn --reload 自动生效
      - ./apps/api/app:/app/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ainerwise
      POSTGRES_USER: ainerwise
      POSTGRES_PASSWORD: ainerwise
    ports:
      - "7073:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ainerwise -d ainerwise"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "7074:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_PROXY: http://api:8000
    volumes:
      # 开发：挂载源码，Vite HMR 即时反映前端改动
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "7075:7075"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:7075/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  admin:
    build:
      context: ./apps/admin
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "7072:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
