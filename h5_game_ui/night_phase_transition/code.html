<style>
        /* Ambient Night Glow Animation */
        @keyframes night-pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.6; }
        }
        .animate-night-pulse {
            animation: night-pulse 4s infinite ease-in-out;
        }
        
        /* Floating Moon Animation */
        @keyframes float-moon {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float-moon {
            animation: float-moon 6s infinite ease-in-out;
        }

        /* Ambient blur overlay to darken background */
        .night-overlay {
            background: radial-gradient(circle at center, rgba(30, 30, 45, 0.85) 0%, rgba(10, 10, 20, 0.98) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface antialiased overflow-hidden selection:bg-primary-fixed-dim selection:text-on-primary-fixed flex justify-center h-screen w-full relative">
