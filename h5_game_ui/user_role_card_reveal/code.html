                            '0%': { transform: 'translateY(20px)', opacity: '0' },

<style>
        /* Specific override for this dark dramatic screen within the light theme */
        body {
            background-color: theme('colors.inverse-surface');
            color: theme('colors.on-secondary');
        }

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="min-h-screen w-full flex flex-col items-center justify-between relative overflow-hidden font-body-md text-body-md">
<!-- Ambient Glow Background -->
<div class="absolute inset-0 pointer-events-none z-0 flex items-center justify-center opacity-40">
<div class="w-[300px] h-[300px] rounded-full bg-tertiary blur-[100px] animate-pulse-glow mix-blend-screen absolute"></div>
<div class="w-[200px] h-[200px] rounded-full bg-secondary blur-[80px] animate-pulse-glow mix-blend-screen absolute translate-x-12 translate-y-12" style="animation-delay: -1s;"></div>
</div>
<!-- Main Content Area -->
<div class="flex-1 w-full flex flex-col items-center justify-center px-margin-mobile z-10 pt-12 pb-32">
<!-- Role Card -->
<div class="w-full max-w-[320px] aspect-[3/4] relative animate-reveal animate-float">
<!-- Glass Card Surface -->
<div class="absolute inset-0 bg-surface-container-lowest/10 backdrop-blur-2xl rounded-[24px] border border-white/20 shadow-[0_0_40px_rgba(0,108,73,0.3)] flex flex-col items-center p-8 overflow-hidden">

<div class="absolute top-0 left-0 right-0 h-[40%] bg-gradient-to-b from-white/10 to-transparent rounded-t-[24px] pointer-events-none"></div>
<!-- Identity Badge -->
<div class="bg-tertiary/20 border border-tertiary-fixed-dim/50 rounded-full px-4 py-1 mb-stack-lg backdrop-blur-md">
<span class="font-label-zh-sm text-label-zh-sm text-tertiary-fixed-dim tracking-wider">Identity: 好人</span>
</div>
<!-- Role Icon/Illustration Placeholder -->
<div class="w-24 h-24 rounded-full bg-gradient-to-br from-tertiary to-secondary flex items-center justify-center shadow-[0_0_20px_rgba(0,108,73,0.5)] mb-stack-md border-2 border-white/30">
<span class="material-symbols-outlined text-[48px] text-white" style="font-variation-settings: 'FILL' 1;">
                        person
                    </span>
</div>
<!-- Role Title -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-white mb-stack-lg text-center drop-shadow-md">
                    Villager<br/><span class="font-headline-md text-headline-md opacity-80 text-surface-container-low">(村民)</span>
</h1>
<!-- Details List -->
<div class="w-full space-y-stack-sm mt-auto">
<div class="bg-black/20 rounded-lg p-3 border border-white/5">
<p class="font-label-zh-sm text-label-zh-sm text-outline-variant mb-1">Ability / 能力</p>
<p class="font-body-md text-body-md text-white">无特殊能力</p>
</div>
<div class="bg-black/20 rounded-lg p-3 border border-white/5">
<p class="font-label-zh-sm text-label-zh-sm text-outline-variant mb-1">Goal / 目标</p>
<p class="font-body-md text-body-md text-white text-sm leading-snug">通过发言、提问和投票找出狼人</p>
</div>
</div>
</div>
</div>
</div>
<!-- Learning HUD & Actions (Fixed Bottom) -->
<div class="fixed bottom-0 left-0 w-full z-20 pb-safe pt-stack-lg px-margin-mobile bg-gradient-to-t from-inverse-surface via-inverse-surface/90 to-transparent flex flex-col gap-stack-lg opacity-0 animate-slide-up">

<div class="w-full">
<h3 class="font-label-zh-sm text-label-zh-sm text-primary-fixed-dim mb-stack-sm pl-1 drop-shadow-sm flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">psychology</span>
                本局你会练习：
            </h3>
<div class="flex flex-wrap gap-2">
<div class="h-touch-target-min flex items-center px-4 rounded-full bg-white/10 border border-white/15 backdrop-blur-md shadow-sm">
<span class="font-label-en-sm text-label-en-sm text-white">I suspect that...</span>
</div>
<div class="h-touch-target-min flex items-center px-4 rounded-full bg-white/10 border border-white/15 backdrop-blur-md shadow-sm">

</div>
<div class="h-touch-target-min flex items-center px-4 rounded-full bg-white/10 border border-white/15 backdrop-blur-md shadow-sm">
<span class="font-label-en-sm text-label-en-sm text-white">I vote for...</span>
</div>
</div>
</div>

<button class="w-full h-touch-target-min rounded-full bg-transparent border border-white/20 hover:bg-white/5 transition-colors text-white font-label-zh-sm text-body-md flex items-center justify-center active:scale-95 duration-200 backdrop-blur-sm">
