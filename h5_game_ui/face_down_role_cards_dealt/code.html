<script>
        // Simple script to auto-scroll to the active card on load for better UX
        document.addEventListener('DOMContentLoaded', () => {
            const carousel = document.querySelector('.overflow-x-auto');
            const activeCard = document.querySelector('.glow-purple');
            
            if (carousel && activeCard) {
                // Calculate scroll position to center the active card
                const scrollLeft = activeCard.offsetLeft - (carousel.clientWidth / 2) + (activeCard.clientWidth / 2);
                carousel.scrollTo({ left: scrollLeft, behavior: 'smooth' });
            }
        });
