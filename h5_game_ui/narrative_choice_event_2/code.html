<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .lumina-glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(79, 70, 229, 0.05);
        }
        .ambient-glow {
            box-shadow: 0 0 24px rgba(79, 70, 229, 0.15);
        }
        
        /* Subtle pulse for AI Hint */
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.95); }
        }
        .animate-pulse-soft {
            animation: pulse-soft 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>

<body class="bg-background text-on-background antialiased selection:bg-primary-fixed selection:text-on-primary-fixed overflow-hidden">
<!-- Full-screen Background Illustration -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-b from-ai-gradient-start to-ai-gradient-end opacity-80 mix-blend-multiply"></div>

</div>

<button class="h-touch-target-min w-touch-target-min flex items-center justify-center rounded-full lumina-glass text-deep-purple hover:bg-white/90 transition-colors active:scale-95 shadow-sm">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex items-center gap-2 lumina-glass px-4 py-1.5 rounded-full shadow-sm">
<span class="material-symbols-outlined text-deep-purple text-sm" data-icon="hourglass_top" data-weight="fill">hourglass_top</span>
<span class="font-label-en-sm text-label-en-sm text-deep-purple font-medium tracking-wide uppercase">Chapter 4</span>
</div>
<div class="w-touch-target-min"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 h-screen flex flex-col justify-end pb-12 pt-24 px-margin-mobile md:max-w-md md:mx-auto">
<!-- Context Card -->
<div class="lumina-glass rounded-[24px] p-6 mb-stack-lg relative overflow-hidden animate-fade-in-up">
<!-- Decorative accent line -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-deep-purple to-secondary-fixed-dim"></div>
<p class="font-body-lg text-body-lg text-on-surface leading-relaxed text-center">
                "The merchant narrows his eyes. He doesn't believe your story. What will you do?"
            </p>
<!-- AI Hint Orb -->
<div class="absolute -top-3 -right-3 w-16 h-16 flex items-center justify-center">
<button class="w-10 h-10 rounded-full bg-gradient-to-br from-ai-gradient-start to-primary-fixed border border-white/60 shadow-lg ambient-glow flex items-center justify-center animate-pulse-soft hover:scale-105 active:scale-95 transition-transform group">

</div>

</div>

<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[14px] text-secondary" data-icon="analytics">analytics</span>

</div>
</div>
</div>
</button>

</main>
<script>
        // Simple entrance animation logic could go here if needed, 
        // but keeping it structural with CSS transitions primarily.
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('button.lumina-glass');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 150 * (index + 1));
            });
        });
    </script>
