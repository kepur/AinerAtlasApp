<style>
        .lumina-bg {
            background: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.08) 0%, rgba(247, 249, 251, 1) 60%);
            background-attachment: fixed;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px -8px rgba(99, 102, 241, 0.05);
        }
        .ambient-shadow {
            box-shadow: 0 4px 20px -5px rgba(99, 102, 241, 0.15);
        }
        /* Hide scrollbar for clean horizontal scrolling */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .pulse-orb {
            animation: pulse-soft 3s infinite ease-in-out alternate;
        }
        @keyframes pulse-soft {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 30px rgba(99, 102, 241, 0.3); }
        }

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface antialiased lumina-bg min-h-screen pb-32">
<!-- Top Navigation Area (Task Focus, Minimal Shell) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop h-touch-target-min bg-surface/70 backdrop-blur-xl border-b border-white/20 shadow-[0_4px_20px_-5px_rgba(99,102,241,0.15)]">
<button class="h-touch-target-min w-touch-target-min flex items-center justify-center text-on-surface-variant hover:bg-primary/10 transition-colors rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary font-bold">Forge Persona</h1>
<button class="h-touch-target-min w-touch-target-min flex items-center justify-center text-on-surface-variant hover:bg-primary/10 transition-colors rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">help_outline</span>
</button>
</header>
<!-- Main Content Canvas -->

<!-- Avatar Preview Section -->
<section class="relative w-full aspect-square md:aspect-video rounded-3xl overflow-hidden glass-card ambient-shadow flex flex-col items-center justify-center">
<!-- Decorative Background Orb -->
<div class="absolute w-64 h-64 bg-gradient-to-tr from-primary/20 to-tertiary/20 rounded-full blur-3xl pulse-orb"></div>

<button class="relative z-10 mt-stack-md flex items-center gap-2 bg-glass-bg border border-primary/20 text-primary font-label-en-sm text-label-en-sm px-4 py-2 rounded-full hover:bg-primary/10 transition-colors h-touch-target-min">
<span class="material-symbols-outlined text-[18px]">auto_awesome</span>
                Regenerate Avatar
            </button>
</section>
<!-- Persona Selection -->
<section class="space-y-stack-sm">
<h2 class="font-headline-md text-headline-md text-on-surface px-2">Path &amp; Persona</h2>
<div class="flex gap-3 overflow-x-auto hide-scrollbar pb-2 px-2 snap-x">
<!-- Active Persona -->
<button class="snap-start flex-shrink-0 flex items-center gap-2 px-5 py-3 rounded-xl bg-primary text-on-primary ambient-shadow min-w-[120px] justify-center transition-transform active:scale-95 h-touch-target-min">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">swords</span>
<span class="font-label-en-sm text-label-en-sm">Swordsman</span>
</button>
<!-- Inactive Personas -->
<button class="snap-start flex-shrink-0 flex items-center gap-2 px-5 py-3 rounded-xl glass-card text-on-surface-variant hover:bg-primary/5 min-w-[120px] justify-center transition-transform active:scale-95 h-touch-target-min border-outline-variant/30">
<span class="material-symbols-outlined">menu_book</span>
<span class="font-label-en-sm text-label-en-sm">Scholar</span>
</button>
<button class="snap-start flex-shrink-0 flex items-center gap-2 px-5 py-3 rounded-xl glass-card text-on-surface-variant hover:bg-primary/5 min-w-[120px] justify-center transition-transform active:scale-95 h-touch-target-min border-outline-variant/30">

<button class="snap-start flex-shrink-0 flex items-center gap-2 px-5 py-3 rounded-xl glass-card text-on-surface-variant hover:bg-primary/5 min-w-[120px] justify-center transition-transform active:scale-95 h-touch-target-min border-outline-variant/30">

<span class="font-label-en-sm text-label-en-sm">Monk</span>

</div>
</section>

<div class="flex justify-between items-center px-2">

<span class="font-label-en-sm text-label-en-sm text-primary">3 / 3 Selected</span>
</div>
<div class="glass-card rounded-2xl p-4 flex flex-wrap gap-2">
<div class="px-4 py-2 rounded-full bg-soft-mint/50 border border-tertiary-fixed text-tertiary font-label-en-sm text-label-en-sm flex items-center gap-1 h-touch-target-min cursor-pointer transition-colors">
<span class="material-symbols-outlined text-[16px]">check</span>
                    Analytical
                </div>
<div class="px-4 py-2 rounded-full bg-primary/10 border border-primary/20 text-primary font-label-en-sm text-label-en-sm flex items-center gap-1 h-touch-target-min cursor-pointer transition-colors">

                </div>
<div class="px-4 py-2 rounded-full bg-surface-container border border-outline-variant text-on-surface-variant font-label-en-sm text-label-en-sm flex items-center gap-1 h-touch-target-min cursor-pointer hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[16px]">add</span>
                    Emotional
                </div>
<div class="px-4 py-2 rounded-full bg-surface-container border border-outline-variant text-on-surface-variant font-label-en-sm text-label-en-sm flex items-center gap-1 h-touch-target-min cursor-pointer hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[16px]">add</span>
                    Stoic
                </div>
</div>
</section>
<!-- Narrative Goal Input (The "Thought" Box) -->
<section class="space-y-stack-sm">
<h2 class="font-headline-md text-headline-md text-on-surface px-2">Define Your Motivation</h2>
<div class="glass-card rounded-2xl p-4 relative group focus-within:ring-2 focus-within:ring-primary/50 transition-all">
<textarea class="w-full bg-transparent border-none focus:ring-0 resize-none font-body-lg text-body-lg text-on-surface placeholder-on-surface-variant/50 min-h-[120px] p-0" placeholder="E.g., I want to uncover the secrets of the lost jade scroll and restore my family's honor..."></textarea>

<div class="mt-4 pt-4 border-t border-outline-variant/20 flex justify-between items-center">

<button class="text-primary font-label-en-sm text-label-en-sm hover:underline">

<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">swords</span>
