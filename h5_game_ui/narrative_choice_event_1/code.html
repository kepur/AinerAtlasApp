<body class="bg-background text-on-surface antialiased w-full h-screen overflow-hidden flex flex-col relative">
<!-- Blurred Background Image -->
<div class="absolute inset-0 w-full h-full z-0 bg-bazaar-blur" data-alt="A highly atmospheric, heavily blurred cinematic shot of a bustling Middle Eastern bazaar or ancient palace courtyard at dusk. The scene is bathed in warm, ethereal light with subtle, glowing highlights of primary deep purple and soft blues reflecting off distant, indistinct architecture. The light-mode aesthetic maintains a bright yet deeply textured composition, evoking a sense of mystery and sophisticated narrative depth. The image is strictly out of focus to serve as an immersive backdrop without distracting from foreground UI elements.">
<div class="absolute inset-0 bg-white/40 backdrop-blur-[60px]"></div>
<div class="absolute inset-0 bg-gradient-to-b from-ai-gradient-start/60 to-ai-gradient-end/60 mix-blend-overlay"></div>
</div>
<!-- Main Content Canvas (No TopAppBar or BottomNav as this is a focused task/event) -->
<main class="relative z-10 flex-1 flex flex-col justify-center px-margin-mobile pb-safe w-full max-w-lg mx-auto h-full overflow-y-auto">
<div class="flex flex-col gap-stack-lg py-stack-lg w-full">
<!-- Context Header -->
<div class="flex justify-center w-full">
<div class="lumina-glass rounded-full px-4 py-1.5 flex items-center gap-2 ambient-shadow-secondary">
<span class="material-symbols-outlined text-[16px] text-secondary">menu_book</span>
<span class="font-label-en-sm text-label-en-sm text-on-surface-variant uppercase tracking-wider">Chapter 4</span>
</div>
</div>
<!-- Narrative Central Card -->
<div class="lumina-glass rounded-xl p-6 ambient-shadow-primary w-full text-center relative overflow-hidden group transition-all duration-300">
<div class="absolute -inset-1 bg-gradient-to-r from-deep-purple/10 to-secondary-container/10 blur-xl opacity-50 group-hover:opacity-70 transition-opacity"></div>
<div class="relative z-10">
<span class="material-symbols-outlined text-[32px] text-deep-purple mb-stack-md block opacity-80">psychology_alt</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface leading-snug">
                        "The merchant narrows his eyes. He doesn't believe your story. What will you do?"
                    </h1>
</div>
</div>
<!-- Choices Stack -->
<div class="flex flex-col gap-stack-sm w-full mt-stack-md">
<!-- Choice 1: Skill Check -->
<button class="w-full text-left lumina-glass rounded-xl p-4 min-h-touch-target-min hover:bg-white/90 active:scale-[0.98] transition-all duration-200 border-l-4 border-l-tertiary group relative overflow-hidden">
<div class="absolute inset-0 bg-tertiary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="relative z-10 flex flex-col gap-1">
<div class="flex items-center gap-2 mb-1">
<span class="bg-tertiary-container/20 text-tertiary px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide inline-flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]">model_training</span>
                                Persuasion Lvl 3
                            </span>
</div>
<span class="font-headline-md text-headline-md text-on-surface">Double Down on the Lie</span>
<span class="font-body-md text-body-md text-on-surface-variant line-clamp-1">Lean into the narrative with unwavering confidence.</span>
</div>
</button>
<!-- Choice 2: Risky -->
<button class="w-full text-left lumina-glass rounded-xl p-4 min-h-touch-target-min hover:bg-white/90 active:scale-[0.98] transition-all duration-200 border-l-4 border-l-error group relative overflow-hidden">
<div class="absolute inset-0 bg-error/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="relative z-10 flex flex-col gap-1">
<div class="flex items-center gap-2 mb-1">
<span class="bg-error-container/50 text-error px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide inline-flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]">warning</span>
                                Risky
                            </span>
</div>
<span class="font-headline-md text-headline-md text-on-surface">Offer a Bribe</span>
<span class="font-body-md text-body-md text-on-surface-variant line-clamp-1">Attempt to buy his silence.</span>
</div>
</button>
<!-- Choice 3: Analytical -->
<button class="w-full text-left lumina-glass rounded-xl p-4 min-h-touch-target-min hover:bg-white/90 active:scale-[0.98] transition-all duration-200 border-l-4 border-l-secondary group relative overflow-hidden">
<div class="absolute inset-0 bg-secondary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="relative z-10 flex flex-col gap-1">
<div class="flex items-center gap-2 mb-1">
<span class="bg-secondary-container/20 text-secondary px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide inline-flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]">analytics</span>
                                Analytical
                            </span>
</div>
<span class="font-headline-md text-headline-md text-on-surface">Change the Subject</span>
<span class="font-body-md text-body-md text-on-surface-variant line-clamp-1">Pivot the conversation to his wares.</span>
</div>
</button>
</div>
</div>
</main>
