<style>
        /* Ambient Background */
        body {
            background-color: #0B0E14;
            background-image: radial-gradient(circle at 50% -20%, rgba(79, 70, 229, 0.3) 0%, transparent 70%),
                              radial-gradient(circle at 100% 80%, rgba(139, 92, 246, 0.2) 0%, transparent 50%);
            background-attachment: fixed;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism Classes */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(79, 70, 229, 0.5);
        }

        /* Scrollbar hiding */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Pulsing animation for active speaker */
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(79, 70, 229, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }
        .speaking-ring {
            animation: pulse-ring 2s infinite;
        }
    </style>

<body class="antialiased min-h-screen flex flex-col relative overflow-hidden font-body-md">
<!-- Top Game Status Bar -->
<header class="fixed top-0 left-0 w-full z-50 pt-safe px-margin-mobile pb-4">
<div class="flex justify-between items-center h-14">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-outline-variant" style="font-variation-settings: 'FILL' 0;">arrow_back_ios</span>
</div>
<div class="flex flex-col items-center">
<h1 class="font-headline-md text-headline-md text-white neon-text">狼人杀 Lite · 第 1 轮白天</h1>
<div class="flex items-center gap-2 mt-1">
<span class="font-label-zh-sm text-label-zh-sm text-tertiary-fixed px-2 py-0.5 rounded-full bg-tertiary/20 border border-tertiary/30">存活 5/6</span>
<span class="font-label-zh-sm text-label-zh-sm text-primary-fixed-dim px-2 py-0.5 rounded-full bg-primary/20 border border-primary/30">你的身份：村民</span>
</div>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-outline-variant" style="font-variation-settings: 'FILL' 0;">more_horiz</span>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto no-scrollbar pt-[100px] pb-[320px] px-margin-mobile flex flex-col gap-stack-lg relative z-10">
<!-- Fixed Learning HUD -->
<section class="glass-card rounded-xl p-4 sticky top-[100px] z-40 shadow-[0_8px_32px_rgba(0,0,0,0.3)]">
<div class="flex items-center justify-between mb-3">
<span class="font-label-zh-sm text-label-zh-sm text-outline-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">school</span>
                    准备质疑别人时，可以这样说：
                </span>
</div>
<div class="bg-white/5 rounded-lg p-3 mb-3 flex justify-between items-center border border-white/10">
<div class="flex flex-col">
<span class="font-body-md text-body-md text-white font-medium">Why did you say that?</span>
<span class="font-label-zh-sm text-label-zh-sm text-outline-variant">你为什么这么说？</span>
</div>
<button class="w-10 h-10 rounded-full bg-deep-purple/20 flex items-center justify-center text-primary-fixed-dim hover:bg-deep-purple/40 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">volume_up</span>
</button>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-3 py-1.5 rounded-full bg-white/10 border border-white/20 font-label-en-sm text-label-en-sm text-white hover:bg-white/20 transition-colors flex items-center gap-1 min-h-[44px]">
<span class="material-symbols-outlined text-[14px]">add</span>

                </button>
<button class="px-3 py-1.5 rounded-full bg-white/10 border border-white/20 font-label-en-sm text-label-en-sm text-white hover:bg-white/20 transition-colors flex items-center gap-1 min-h-[44px]">
<span class="material-symbols-outlined text-[14px]">add</span>

                </button>
</div>
</section>
<!-- Player Strip -->

</div>
<span class="font-label-en-sm text-label-en-sm mt-2 text-outline-variant">Player A</span>

</div>

<!-- Player D -->

</div>

</div>
<!-- Player E -->

<span class="font-headline-md text-headline-md text-on-surface-variant">E</span>
</div>
</div>
<span class="font-label-en-sm text-label-en-sm mt-2 text-outline-variant">Player E</span>
</div>

<div class="relative w-[60px] h-[60px] rounded-full p-1 bg-gradient-to-br from-tertiary-fixed to-tertiary-container">

<span class="material-symbols-outlined text-[24px] text-tertiary-fixed" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
</div>
<span class="font-label-en-sm text-label-en-sm mt-2 text-tertiary-fixed font-bold">You</span>
</div>
</div>
</section>
<!-- Speech Feed -->
<section class="flex flex-col gap-stack-md">
<!-- Hint Card -->
<div class="glass-card rounded-xl p-4 border-error/50 bg-error/10 relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-error"></div>
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-error mt-0.5" style="font-variation-settings: 'FILL' 1;">warning</span>
<div class="flex flex-col">

<span class="font-body-md text-body-md text-white/90">B 称在储藏室，但 C 没看到 B</span>
</div>
</div>
</div>
<!-- Speech Bubble B -->
<div class="flex gap-3 max-w-[85%]">
<div class="w-8 h-8 rounded-full bg-secondary-container flex-shrink-0 flex items-center justify-center text-white font-bold text-sm">B</div>
<div class="glass-card rounded-2xl rounded-tl-none p-3">

<div class="flex justify-between items-center mt-2 pt-2 border-t border-white/10">
<span class="font-label-zh-sm text-label-zh-sm text-outline-variant text-[11px]">我在储藏室附近...</span>
<button class="w-6 h-6 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-[14px] text-white" style="font-variation-settings: 'FILL' 1;">volume_up</span>
</button>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Action Panel -->
<div class="fixed bottom-0 left-0 w-full z-50 glass-panel rounded-t-3xl pt-4 pb-safe px-margin-mobile shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<div class="w-12 h-1 bg-white/20 rounded-full mx-auto mb-4"></div>
<h3 class="font-headline-md text-headline-md text-white mb-4 text-center">你想问谁？</h3>
<!-- Player Selectors -->
<div class="flex justify-between mb-6 px-2">
<button class="w-12 h-12 rounded-full glass-card flex items-center justify-center font-headline-md text-white border-white/20 hover:bg-white/10 transition-colors focus:ring-2 focus:ring-deep-purple">A</button>
<button class="w-12 h-12 rounded-full glass-card flex items-center justify-center font-headline-md text-white border-white/20 bg-deep-purple/30 ring-2 ring-deep-purple transition-colors">B</button>
<button class="w-12 h-12 rounded-full glass-card flex items-center justify-center font-headline-md text-white border-white/20 hover:bg-white/10 transition-colors focus:ring-2 focus:ring-deep-purple">C</button>
<button class="w-12 h-12 rounded-full glass-card flex items-center justify-center font-headline-md text-white border-white/20 hover:bg-white/10 transition-colors focus:ring-2 focus:ring-deep-purple">D</button>
<button class="w-12 h-12 rounded-full glass-card flex items-center justify-center font-headline-md text-white border-white/20 hover:bg-white/10 transition-colors focus:ring-2 focus:ring-deep-purple">E</button>
</div>
<!-- Quick Chips -->
<div class="flex gap-2 overflow-x-auto no-scrollbar mb-4 pb-1">
<button class="px-4 py-2 rounded-full glass-card whitespace-nowrap font-label-en-sm text-label-en-sm text-white/90 border-white/20 min-h-[44px]">Why were you there?</button>
<button class="px-4 py-2 rounded-full glass-card whitespace-nowrap font-label-en-sm text-label-en-sm text-white/90 border-white/20 min-h-[44px]">Did you see C?</button>
</div>
<!-- Input Area -->
<div class="relative">
<input class="w-full min-h-[56px] rounded-2xl glass-card text-white px-4 pr-14 focus:outline-none focus:ring-2 focus:ring-deep-purple border-white/20 font-body-md text-body-md placeholder:text-outline-variant bg-white/5" placeholder="Type your thought... (English)" type="text"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-deep-purple flex items-center justify-center hover:scale-95 transition-transform">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</div>
