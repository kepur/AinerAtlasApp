name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  api-test:
    name: API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        env:
          DATABASE_URL: sqlite:///./test-ci.db
          JWT_SECRET: ci-test-secret-key-32chars-min
          ENCRYPTION_KEY: ci-encryption-key-for-tests-only
        run: pytest -q

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build

  admin-build:
    name: Admin Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [api-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t ainerspeak-api:ci apps/api
